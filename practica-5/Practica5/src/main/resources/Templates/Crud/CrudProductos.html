<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crud productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container">

        <nav class="navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="btn btn-outline-light" href="/">
                    <i class="bi bi-shop"></i>
                    Comprar
                </a>

                <div class="navbar-nav ms-auto gap-5">
                    <li class="nav-item dropdown" th:classappend="${deshabilitado} ? ' disabled pe-none' : ''">

                        <a class="nav-link dropdown-toggle"
                           data-bs-toggle="dropdown"
                           href="#">
                            <i class="bi bi-person-badge"></i>
                            <span>
                                Administracion
                            </span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:classappend="${deshabilitado} ? ' disabled pe-none' : ''" href="/administracion/ventas">Ventas</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" th:classappend="${deshabilitado} ? ' disabled pe-none' : ''" href="/administracion/">Administrar productos</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" th:classappend="${deshabilitado} ? ' disabled pe-none' : ''" href="/administracion/dashboard">Dashboard</a></li>
                        </ul>
                    </li>
                    <a class="nav-link" href="/crud-producto/carrito"><i class="bi bi-cart3"></i><span th:text="'(' + ${cantCarrito} + ')'"></span></a>
                    <li class="nav-item dropdown" th:if="${usuario != null}">

                        <a class="nav-link dropdown-toggle"
                           data-bs-toggle="dropdown"
                           href="#">
                            <i class="bi bi-person-fill"></i>
                            <span th:text="${usuario != null ? usuario.usuario : 'Iniciar sesión'}">
                                    Iniciar sesión
                                </span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/login">Cambiar Usuario</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/cerrar-sesion">Cerrar sesion</a></li>
                        </ul>
                    </li>
                    <a class="nav-link" th:unless="${usuario != null}" href="/login">
                        <i class="bi bi-person-fill"></i>
                        Iniciar sesión
                    </a>
                </div>

            </div>
        </nav>

        <div class="my-2 text-start">
            <h4 class="bold" style="color: green;">Usuarios en linea: <span id="cantUsuarios">0</span></h4>
        </div>

        <div class="px-4 py-5 my-3  text-center">
            <h1 class="bold">Crud productos</h1>
        </div>

        <a href="/administracion/crear" class="btn btn-primary mb-3">Nuevo Producto</a>


        <table class="table table-bordered ">
            <thead>

            <th scope="col">Producto</th>
            <th scope="col">Precio(RD$)</th>
            <th scope="col">Accion</th>
            </thead>
            <tbody class="table-group-divider mb-3">
                <tr th:each="producto : ${lista}">

                    <td th:text="${producto.nombre}" class="mb-3">Nombre</td>

                    <td th:text="${producto.precio}" class="mb-3">0</td>

                    <td class="mb-3">
                        <a th:href="'/administracion/modificar/'+${producto.idProducto}" class="btn btn-primary col-auto">Modificar</a>
                        <form th:action="'/administracion/eliminar/' + ${producto.idProducto}"
                              method="post"
                              style="display:inline;">
                            <button type="submit" class="btn btn-danger">
                                Eliminar
                            </button>
                        </form>
                    </td>

                </tr>
            </tbody>
        </table>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="/Scripts/contUsuarioScript.js"></script>

</body>
</html>
