<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-dark">
<div class="card p-4 shadow" style="width: 420px;">
  <h1 class="text-center mb-4">Login</h1>


  <form method="post" action="procesar-login">
    <div class="mb-3">
      <label for="userInput" class="form-label">User</label>
      <input type="text" class="form-control" id="userInput" name="usuario">
    </div>

    <div class="mb-3">
      <label for="InputPassword" class="form-label">Password</label>
      <input type="password" class="form-control" id="InputPassword" name="password">
    </div>

    <div class="d-flex gap-3 justify-content-center">
      <button type="submit" class="btn btn-primary">
        Submit
      </button>

      <a class="btn btn-danger" href="/">
        Cancelar
      </a>
    </div>

  </form>
</div>
</body>
</html>
