<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crud productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>


    <div class="container">
        <div class="px-4 py-5 my-3  text-center">
            <h1 class="bold">Crud productos</h1>
        </div>

        <a href="/crud-producto/crear" class="btn btn-primary mb-3">Nuevo Producto</a>


        <table class="table table-bordered ">
            <thead>

            <th scope="col">Producto</th>
            <th scope="col">Precio(RD$)</th>
            <th scope="col">Accion</th>
            </thead>
            <tbody class="table-group-divider mb-3">
                <tr th:each="producto : ${lista}">

                    <td th:text="${producto.nombre}" class="mb-3">Nombre</td>

                    <td th:text="${producto.precio}" class="mb-3">0</td>

                    <td class="mb-3">
                        <a th:href="'/crud-producto/editar/'+${producto.idProducto}" class="btn btn-primary col-auto">Editar</a>
                        <a th:href="'/crud-producto/eliminar/'+${producto.idProducto}" class="btn btn-danger col-auto">Eliminar</a>
                    </td>

                </tr>
            </tbody>
        </table>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
