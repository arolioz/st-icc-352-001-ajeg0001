<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="./css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="min-h-screen bg-amber-50">
    <nav class="bg-amber-950 py-8 relative">
        <div class="container mx-auto flex ">
            <div class="flex grow">
                <a href="#" class="text-amber-50 text-2xl font-bold">LOGO</a>
            </div>

            <img src="iconos/menu.svg" alt="Menu" class="lg:hidden cursor-pointer" id="menu-icon">
            <div class="lg:flex hidden grow justify-between">
                <div>
                    <a href="inicio.html" class="nav-link">Inicio</a>
                    <a href="listaEventos.html" class="nav-link">Eventos</a>
                    <a href="inicio.html" class="nav-link">Sobre nosotros</a>
                </div>

                <div>
                    <a href="login.html" class="text-amber-50 border border-amber-50 py-2 px-5 rounded-lg hover:bg-amber-50 hover:text-amber-950 transition duration-300 ease-in-out lg:mr-3">Iniciar sesión</a>
                    <a href="registrar.html" class="text-amber-950 bg-amber-50 border border-amber-50 py-2 px-5 rounded-lg hover:bg-amber-600 transition duration-300 ease-in-out">Registrarse</a>
                </div>


            </div>


        </div>

    </nav>

    <div class="card">

        <div class="card-header relative">
            <h2 class="text-center text-3xl font-bold text-amber-50">
                <i class="bi bi-person-fill"></i>
                Iniciar sesión
            </h2>

            <a href="inicio.html" class="icon-x">
                <i class="bi bi-x-lg"></i>
            </a>



        </div>

        <div class="card-body">
            <form action="/login/procesarLogin" method="post" class="space-y-5">

                <div>
                    <label for="usuario" class="block text-1xl font-medium text-gray-700">
                        Usuario
                    </label>

                    <input id="usuario" name="usuario" type="text" required class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">
                </div>

                <div>
                    <label for="password" class="block text-1xl  text-gray-700 font-medium">
                        Contraseña
                    </label>

                    <div class="relative mt-2">

                        <input id="password" name="password" type="password" required class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">

                        <button id="btnVerContrasena" type="button" class="absolute inset-y-0 right-3 flex items-center text-gray-500 hover:text-gray-700">
                            <i id="verContrasena" class="bi bi-eye-slash-fill cursor-pointer"></i>

                        </button>

                    </div>

                </div>

                <div class="flex items-center">
                    <input id="recordarUsuario" name="recordarUsuario" type="checkbox" class="h-4 w-4 rounded border-amber-950 text-amber-700 focus:ring-amber-700">

                    <label for="recordarUsuario" class=" text-1xl text-gray-700 px-3">
                            Recordar usuario
                    </label>


                </div>

                <button
                        type="submit"
                        class="boton1 color4">
                    Enviar
                </button>

            </form>

        </div>

    </div>


    <script src="./Scripts/registro.js"></script>

</body>
</html>
