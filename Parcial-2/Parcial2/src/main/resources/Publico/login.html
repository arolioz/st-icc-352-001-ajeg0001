<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="./css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="min-h-screen bg-amber-50">
<nav class="bg-amber-950 py-8 relative">
    <div class="container mx-auto flex ">
        <div class="flex grow">
            <a class="text-amber-50 text-2xl font-bold">Aeternum Eventos</a>
        </div>

        <img src="iconos/menu.svg" alt="Menu" class="lg:hidden cursor-pointer" id="menu-icon">
        <div class="lg:flex hidden grow justify-between">
            <div class="flex items-center gap-4">
                <a href="/inicio.html" class="nav-link">Inicio</a>

                <div class="relative group">
                    <button class="nav-link flex items-center cursor-pointer">
                        Eventos <i class="bi bi-caret-down-fill"></i>
                    </button>

                    <div class=" min-w-max absolute left-0 top-full hidden group-hover:flex flex-col bg-white shadow-lg">

                        <a href="/Templates/listaEventos.html" class="menu">Eventos</a>
                        <a href="/Templates/crearEventos.html" id="navCrearEvento" class="menu hidden">Crear eventos</a>
                        <a href="/Templates/tablaEventos.html" id="navEventos" class="menu hidden">Gestionar eventos</a>
                        <a href="/Templates/eventosUsuario.html" class="menu">Mis eventos</a>

                    </div>
                </div>

                <a href="/Templates/listaUsuarios.html" id="navUsuario" class="nav-link hidden">Usuarios</a>

            </div>

            <div>
                <a href="login.html" id="btnLogin" class="text-amber-50 border border-amber-50 py-2 px-5 rounded-lg hover:bg-amber-50 hover:text-amber-950 transition duration-300 ease-in-out lg:mr-3">Iniciar sesión</a>
                <a href="registrar.html" id="btnRegistrar" class="text-amber-950 bg-amber-50 border border-amber-50 py-2 px-5 rounded-lg hover:bg-[#c6956e] transition duration-300 ease-in-out">Registrarse</a>

                <div id="infoUsuario" class="hidden flex items-center gap-2">
                    <i class="bi bi-person-circle text-amber-50 text-2xl"></i>
                    <span id="nombreUsuario" class="text-amber-50 font-semibold text-xl"></span>

                    <a id="btnCerrarSesion" href="/Usuarios/cerrarSesion" class="btn-cancelar px-6">
                        Cerrar sesión
                    </a>
                </div>
            </div>


        </div>


    </div>

</nav>

    <div class="card">

        <div class="card-header relative">
            <h2 class="text-center text-3xl font-bold text-amber-50">
                <i class="bi bi-person-fill"></i>
                Iniciar sesión
            </h2>

            <a href="inicio.html" class="icon-x">
                <i class="bi bi-x-lg"></i>
            </a>



        </div>

        <div class="card-body">
            <form action="/login/procesarLogin" method="post" class="space-y-5">

                <div>
                    <label for="usuario" class="block text-1xl font-medium text-gray-700">
                        Usuario
                    </label>

                    <input id="usuario" name="usuario" type="text" required class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">
                </div>

                <div>
                    <label for="password" class="block text-1xl  text-gray-700 font-medium">
                        Contraseña
                    </label>

                    <div class="relative mt-2">

                        <input id="password" name="password" type="password" required class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">

                        <button id="btnVerContrasena" type="button" class="absolute inset-y-0 right-3 flex items-center text-gray-500 hover:text-gray-700">
                            <i id="verContrasena" class="bi bi-eye-slash-fill cursor-pointer"></i>

                        </button>

                    </div>

                </div>

                <div class="flex items-center">
                    <input id="recordarUsuario" name="recordarUsuario" type="checkbox" class="h-4 w-4 rounded border-amber-950 text-amber-700 focus:ring-amber-700">

                    <label for="recordarUsuario" class=" text-1xl text-gray-700 px-3">
                            Recordar usuario
                    </label>


                </div>

                <button
                        type="submit"
                        class="boton1 color4">
                    Enviar
                </button>

            </form>

        </div>

    </div>


    <script src="./Scripts/registro.js"></script>
    <script src="/Scripts/funciones.js"></script>

    <script>
        configurarNavbar();
        configurarSesion();
    </script>

</body>
</html>
