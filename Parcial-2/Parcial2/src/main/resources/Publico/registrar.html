<body class="min-h-screen bg-amber-50">

<nav class="bg-amber-950 py-8 relative">
    <div class="container mx-auto flex">
        <div class="flex grow">
            <a class="text-amber-50 text-2xl font-bold">Aeternum Eventos</a>
        </div>

        <div class="lg:flex hidden grow justify-between">
            <div class="flex items-center gap-4">
                <a href="/inicio.html" class="nav-link">Inicio</a>

                <div class="relative group">
                    <button class="nav-link flex items-center cursor-pointer">
                        Eventos <i class="bi bi-caret-down-fill"></i>
                    </button>

                    <div class=" min-w-max absolute left-0 top-full hidden group-hover:flex flex-col bg-white shadow-lg z-50">

                        <a href="/Templates/listaEventos.html" class="menu">Eventos</a>
                        <a href="/Templates/crearEventos.html" id="navCrearEvento" class="menu hidden">Crear eventos</a>
                        <a href="/Templates/tablaEventos.html" id="navEventos" class="menu hidden">Gestionar eventos</a>
                        <a href="/Templates/eventosUsuario.html" class="menu">Mis eventos</a>

                    </div>

                </div >
                <a href="/Templates/listaUsuarios.html" id="navUsuario" class="nav-link hidden">Usuarios</a>

            </div>
            <div>
                <a href="login.html" id="btnLogin" class="text-amber-50 border border-amber-50 py-2 px-5 rounded-lg hover:bg-amber-50 hover:text-amber-950 transition duration-300 ease-in-out lg:mr-3">Iniciar sesión</a>
                <a href="registrar.html" id="btnRegistrar" class="text-amber-950 bg-amber-50 border border-amber-50 py-2 px-5 rounded-lg hover:bg-[#c6956e] transition duration-300 ease-in-out">Registrarse</a>

                <div id="infoUsuario" class="hidden flex items-center gap-2">
                    <i class="bi bi-person-circle text-amber-50 text-2xl"></i>
                    <span id="nombreUsuario" class="text-amber-50 font-semibold text-xl"></span>

                    <a id="btnCerrarSesion" href="/Usuarios/cerrarSesion" class="btn-cancelar px-6">
                        Cerrar sesión
                    </a>
                </div>
            </div>
        </div>
        <div id="infoUsuarioMovil" class="hidden lg:hidden flex items-center gap-1">
            <i class="bi bi-person-circle text-amber-50 text-2xl"></i>
            <span id="nombreUsuarioMovil" class="text-amber-50 font-semibold text-xl"></span>

            <a id="btnCerrarSesionMovil" href="/Usuarios/cerrarSesion" class="btn-cancelar px-3">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>
        <div class="flex lg:hidden justify-end m-1">
            <button id="btnMenuMovil" class="text-4xl text-white">
                <i class="bi bi-list"></i>
            </button>
        </div>
        <div id="menuMovil"
             class="hidden lg:hidden absolute top-full left-0 w-full bg-amber-950 border-t border-amber-500 shadow-lg z-50">

            <a href="login.html" id="btnLoginMovil"
               class="movil-menuItem block border-b border-amber-50 ">Iniciar sesión</a>
            <a href="registrar.html" id="btnRegistrarMovil"
               class="movil-menuItem block border-b border-amber-50 ">Registrarse</a>

            <a href="/inicio.html"
               class="movil-menuItem block border-b border-amber-50 ">
                Inicio
            </a>

            <a href="/Templates/listaEventos.html"
               class="movil-menuItem block border-b border-amber-50">
                Eventos
            </a>

            <a href="/Templates/crearEventos.html" id="navCrearEventoMovil" class="movil-menuItem block border-b border-amber-50 hidden">Crear eventos</a>
            <a href="/Templates/tablaEventos.html" id="navEventosMovil" class="movil-menuItem block border-b border-amber-50 hidden">Gestionar eventos</a>
            <a href="/Templates/listaUsuarios.html" id="navUsuarioMovil" class="movil-menuItem block border-b border-amber-50 hidden">Usuarios</a>

            <a href="/Templates/eventosUsuario.html" class="movil-menuItem block">
                Mis eventos

    <div class="card">

        <div class="card-header card-large">

            <h2 class="text-center text-3xl font-bold text-amber-50">
                Registro
            </h2>

        </div>

        <div class="card-body card-large">
            <form action="/login/procesarRegistrar" method="post" class="space-y-5">

                <div>
                    <label for="usuario" class="block text-1xl font-medium text-gray-700">
                        Usuario
                    </label>

                    <input id="usuario" name="usuario" type="text" required class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">
                </div>

                <div>
                    <label for="nombre" class="block text-1xl font-medium text-gray-700">
                        Nombre Completo
                    </label>

                    <input id="nombre" name="nombre" type="text" required class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">
                </div>


                <div>
                    <label for="password" class="block text-1xl  text-gray-700 font-medium">
                        Contraseña
                    </label>

                    <div class="relative mt-2">

                        <input id="password" name="password" type="password" required class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">
                        
                        <button id="btnVerContrasena" type="button" class="absolute inset-y-0 right-3 flex items-center text-gray-500 hover:text-gray-700">
                            <i id="verContrasena" class="bi bi-eye-slash-fill cursor-pointer"></i>
                        
                        </button>

                    </div>

                </div>

                <div>
                    <label for="institucion" class="block text-1xl font-medium text-gray-700">
                        Institución
                    </label>

                    <input id="institucion" name="institucion" type="text" placeholder="(Opcional)" class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">
                </div>

                <div>
                    <label for="email" class="block text-1xl font-medium text-gray-700">
                        Correo electrónico
                    </label>

                    <input id="email" name="email" type="email" required class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">
                </div>

                <button
                        type="submit"
                        class="boton1 color4 ">
                    Crear cuenta
                </button>

                <p class="mt-4 text-center text-gray-700"> ¿Ya tienes una cuenta?
                <a href="login.html" class="font-semibold text-amber-950 hover:underline">
                    Inicia sesión
                </a>
                </p>

            </form>

        </div>

    </div>


    <script src="./Scripts/registro.js"></script>
    <script src="/Scripts/funciones.js"></script>

    <script>
        configurarNavbar();
        configurarSesion();
    </script>
</body>
</html>
