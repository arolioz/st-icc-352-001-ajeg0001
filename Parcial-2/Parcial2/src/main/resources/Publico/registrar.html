<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar</title>
    <link href="./css/style.css" rel="stylesheet">
</head>

<body class="min-h-screen bg-amber-50">

<div class="card">

    <div class="card-header">

        <h2 class="text-center text-3xl font-bold text-amber-50">
            Registro
        </h2>

    </div>

    <div class="card-body w-fit">
        <form action="/login/procesarRegistrar" method="post" class="space-y-5">

            <div>
                <label for="usuario" class="block text-1xl font-medium text-gray-700">
                    Usuario
                </label>

                <input id="usuario" name="usuario" type="text" required class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">
            </div>

            <div>
                <label for="nombre" class="block text-1xl font-medium text-gray-700">
                    Nombre Completo
                </label>

                <input id="nombre" name="nombre" type="text" required class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">
            </div>


            <div>
                <label for="password" class="block text-1xl  text-gray-700 font-medium">
                    Contraseña
                </label>

                <input id="password" name="password" type="password" required class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">
            </div>

            <div>
                <label for="institucion" class="block text-1xl font-medium text-gray-700">
                    Institución
                </label>

                <input id="institucion" name="institucion" type="text" placeholder="(Opcional)" class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">
            </div>

            <div>
                <label for="email" class="block text-1xl font-medium text-gray-700">
                    Correo electrónico
                </label>

                <input id="email" name="email" type="email" required class="mt-2 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-700">
            </div>

            <button
                    type="submit"
                    class="boton1 color4">
                Crear cuenta
            </button>

            <p class="mt-4 text-center text-gray-700"> ¿Ya tienes una cuenta?
            <a href="login.html" class="font-semibold text-amber-950 hover:underline">
                Inicia sesión
            </a>
            </p>

        </form>

    </div>

</div>

</body>
</html>
