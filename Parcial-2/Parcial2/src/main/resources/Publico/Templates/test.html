<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
<div id="reader">
    <h1>Leyendo</h1>
</div>

<script>
    const scanner = new Html5QrcodeScanner("reader", {
        fps: 10,
        qrbox: {
            width: 720,
            height: 720
        }
    });

    scanner.render((decodedText) => {
        console.log(decodedText);

        // Si el QR contiene JSON
        const data = JSON.parse(decodedText);

        fetch("/Eventos/marcarAsistencia/" + data.token, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });
    });
</script>
</body>
</html>
